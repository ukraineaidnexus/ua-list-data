name: Trigger site rebuild
on:
  push:
    branches: [main]
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ua-list to rebuild
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ukraineaidnexus/ua-list/dispatches \
            -d '{"event_type":"data-updated"}'
