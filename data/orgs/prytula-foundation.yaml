tags: [military, humanitarian, medical]
description: "One of Ukraine's largest charitable foundations, founded by volunteer and TV presenter Serhiy Prytula. Military division supplies drones, comms, EW, optics, vehicles and medical equipment to the Defence Forces (famously crowdfunded the 'People's Bayraktar' and an ICEYE satellite). Humanitarian division supports civilians in de-occupied and frontline areas: mobile medical teams, demining, school shelters, modular housing."
notes: "Serhiy's personal account is [@serhiyprytula](https://x.com/serhiyprytula). US donors: Prytula Foundation U.S.A. ([prytulafoundation.us](https://prytulafoundation.us)) is a separate 501(c)(3) funding humanitarian projects only."
