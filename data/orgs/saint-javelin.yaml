tags: [military, humanitarian]
description: "Canadian merch brand founded by Christian Borys that has donated over $2M in profits to Ukraine's war effort since February 2022: drones, generators, tactical medical supplies (IFAKs, tourniquets) and humanitarian projects, mainly via Unite with Ukraine (Ukrainian World Congress). Manufactures in Ukraine to support local businesses. Not a charity — you support them by buying merch, not donating."
notes: "Long-term partner of the Ukrainian World Congress's Unite with Ukraine initiative; donation reports published on their Impact blog."
