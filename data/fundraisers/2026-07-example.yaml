# =============================================================
# FUNDRAISER — copy into data/fundraisers/ as YYYY-MM-orgid-shortname.yaml
# (date prefix keeps files sorted and names unique)
# =============================================================

draft: true                    # true = NOT published. Delete this line to go live.

org: dzygas-paw                # [REQUIRED] must match an id in data/orgs/
                               # card links to that org's entry on /ngos/ or /volunteers/

title: "What's being raised"   # [REQUIRED]
beneficiary: "Who it's for, e.g. 92nd Assault Brigade, Kupiansk direction"

goal:
  amount: 12000                # number only
  currency: USD                # USD | EUR | GBP | UAH

raised: 0                      # optional; shows amount + % and a progress bar when goal is set.
                               # Delete the line if unknown.

announced: 2026-07-04          # [REQUIRED] date of the fundraiser post (YYYY-MM-DD)
expires: 2026-09-04            # auto-moves to "past" after this date (daily rebuild),
                               # even if you forget to edit the file

status: active                 # [REQUIRED] active | completed | expired
tags: [military]              # cause tags: military | humanitarian | medical | animals (one or more)
                               # completed/expired collapse into "Completed & past"

links:                         # all optional
  x: https://x.com/.../status/...
  bluesky: https://bsky.app/profile/.../post/...
  donate: https://send.monobank.ua/jar/...   # highlighted Donate link
  web: https://...                           # "Details" link

report: null                   # link to the completion report once done — this builds
                               # the org's public track record; set with status: completed
