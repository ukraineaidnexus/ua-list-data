title: "Repair and restoration of damaged Steyr 1291"
beneficiary: "25th Separate Assault Battalion"
description: >
  The Steyr 1291 military truck the fund delivered to the 25th Assault
  Battalion in spring was hit by a drone on a combat mission and overturned,
  destroying the cabin and cargo compartment. Rather than write it off, the
  fund is rebuilding it with cannibalized parts ("FrankenSteyr") to return
  it to service.
